# Basic Configuration Example
# A simple scenario for condo vs house cost comparison

years: 20
discount_rate: 0.03

economic:
  mode: real
  inflation_rate: 0.0

condo:
  monthly_fee: 450
  fee_escalation_rate: 0.02
  events: []
  other_recurring_costs: []

house:
  initial_value: 400000
  value_growth_rate: 0.01
  annual_maintenance_rate: 0.015
  events:
    - name: "roof"
      base_cost: 10000
      expected_year: 20
      timing_std_years: 3
      cost_vol: 0.25
  other_recurring_costs: []

simulation:
  num_sims: 10000
  random_seed: 42
  house_maintenance_vol: 0.30
  condo_fee_vol: 0.05
